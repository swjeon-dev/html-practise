      </div>
    </header>
    <section class="login-section">
      <div class="login-section login__form__header">
        <h1 class="login__form__title">Welcome to KakaoTalk</h1>
        <span class="login__form__description">
          If you Have a Kakao Account,<br />
          in with your email or phone number.</span
        >
      </div>
      <div class="login__form">
        <div class="login__input-container">
          <input
            type="text"
            name="username"
            placeholder="Email or phone number"
          />
        </div>
        <div class="login__input-container">
          <input type="password" name="password" placeholder="Password" />
        </div>
        <div class="login__links">
          <a href="./friends.html" class="login">Login</a>
          <a href="./sighup" class="signup">Sign up</a>
          <a href="#" class="find">Find Kakao Account or Password</a>
        </div>
      </div>
    </section>
  </body>
</html>
